<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Twin-Sparrow Claude Adapter">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1020"/>
      <stop offset="0.55" stop-color="#080a15"/>
      <stop offset="1" stop-color="#04050b"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5b25a" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#f5b25a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#57c8e6" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#57c8e6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5b25a" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#8a93b0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#57c8e6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f6c987"/>
      <stop offset="0.5" stop-color="#f4f6ff"/>
      <stop offset="1" stop-color="#8fdcef"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="480" fill="url(#bg)"/>
  <circle cx="470" cy="150" r="240" fill="url(#sunGlow)"/>
  <circle cx="730" cy="150" r="240" fill="url(#moonGlow)"/>

  <!-- faint stars -->
  <g fill="#c7d0ee" opacity="0.5">
    <circle cx="180" cy="70" r="1.3"/>
    <circle cx="300" cy="120" r="1"/>
    <circle cx="980" cy="60" r="1.4"/>
    <circle cx="1060" cy="140" r="1"/>
    <circle cx="120" cy="200" r="1"/>
    <circle cx="1090" cy="220" r="1.2"/>
    <circle cx="600" cy="48" r="1"/>
  </g>

  <!-- adapter wire -->
  <line x1="230" y1="252" x2="970" y2="252" stroke="url(#wire)" stroke-width="2"/>

  <!-- ===== Solaris sparrow (amber, facing right) ===== -->
  <g transform="translate(470,222)" fill="#f5b25a" filter="url(#soft)">
    <!-- tail -->
    <path d="M -22 4 L -54 12 L -52 19 L -20 11 Z"/>
    <!-- body -->
    <ellipse cx="0" cy="0" rx="27" ry="20"/>
    <!-- head -->
    <circle cx="24" cy="-15" r="13"/>
    <!-- beak -->
    <path d="M 36 -15 L 49 -12 L 36 -9 Z"/>
    <!-- wing -->
    <path d="M 6 -8 C -6 -6 -18 4 -22 12 C -8 8 4 6 12 -2 Z" fill="#d98f37"/>
    <!-- legs -->
    <line x1="-4" y1="18" x2="-6" y2="30" stroke="#f5b25a" stroke-width="2.2"/>
    <line x1="7" y1="18" x2="7" y2="30" stroke="#f5b25a" stroke-width="2.2"/>
    <!-- eye -->
    <circle cx="28" cy="-17" r="2.1" fill="#0d1020"/>
  </g>

  <!-- ===== Atoman sparrow (cyan, facing left) ===== -->
  <g transform="translate(730,222) scale(-1,1)" fill="#57c8e6" filter="url(#soft)">
    <path d="M -22 4 L -54 12 L -52 19 L -20 11 Z"/>
    <ellipse cx="0" cy="0" rx="27" ry="20"/>
    <circle cx="24" cy="-15" r="13"/>
    <path d="M 36 -15 L 49 -12 L 36 -9 Z"/>
    <path d="M 6 -8 C -6 -6 -18 4 -22 12 C -8 8 4 6 12 -2 Z" fill="#3aa6c4"/>
    <line x1="-4" y1="18" x2="-6" y2="30" stroke="#57c8e6" stroke-width="2.2"/>
    <line x1="7" y1="18" x2="7" y2="30" stroke="#57c8e6" stroke-width="2.2"/>
    <circle cx="28" cy="-17" r="2.1" fill="#0d1020"/>
  </g>

  <!-- ===== wordmark ===== -->
  <text x="600" y="345" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif" font-size="66" font-weight="700"
        letter-spacing="1" fill="url(#titleFill)">Twin-Sparrow</text>

  <text x="600" y="388" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif" font-size="23" font-weight="500"
        letter-spacing="13" fill="#aab4d4">CLAUDE ADAPTER</text>

  <text x="600" y="432" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif" font-size="16.5" font-weight="400"
        letter-spacing="0.4" fill="#71799a">Token-efficient runtime capsules · one companion, two activations</text>
</svg>
